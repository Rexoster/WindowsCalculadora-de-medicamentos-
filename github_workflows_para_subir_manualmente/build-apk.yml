name: Compilar prueba debug (no sirve para actualizar)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Limpiar archivos generados anteriores
        run: |
          rm -rf app/build app/schemas

      - name: Revisión previa del código
        run: python3 scripts/preflight_source_checks.py

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Configurar caché de Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK mínimo
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;35.0.0" >/dev/null

      - name: Permiso de Gradle
        run: chmod +x gradlew

      - name: Compilar y probar
        env:
          APP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: ./gradlew testDebugUnitTest assembleDebug --build-cache --no-parallel --stacktrace --warning-mode all

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: NO-USAR-PARA-ACTUALIZAR-debug
          path: app/build/outputs/apk/debug/app-debug.apk
