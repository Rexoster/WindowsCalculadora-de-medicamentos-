name: Windows - Publicar actualización

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Versión Windows. Usa formato 3 números, por ejemplo 3.1.1"
        required: true
        default: "3.1.1"
      release_notes:
        description: "Notas visibles dentro de la app"
        required: false
        default: "Actualización de Calculadora de Medicamentos para Windows."
  push:
    tags:
      - "windows-v*"
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar versión
        shell: pwsh
        run: |
          $rawVersion = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $rawVersion = "${{ inputs.version_name }}"
          }
          $version = $rawVersion -replace '^refs/tags/', '' -replace '^windows-v', '' -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "La versión debe tener formato 3.1.1, sin letras ni espacios. Windows es especialito con eso."
          }
          "APP_VERSION_NAME=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_UPDATE_REPOSITORY=${{ github.repository }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=windows-v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verificar WiX Toolset
        shell: pwsh
        run: |
          $wixPaths = @(
            "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
            "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          )
          foreach ($path in $wixPaths) {
            if (Test-Path $path) { $env:PATH += ";$path" }
          }
          $light = Get-Command light.exe -ErrorAction SilentlyContinue
          if (-not $light) {
            choco install wixtoolset -y --no-progress
            foreach ($path in $wixPaths) {
              if (Test-Path $path) { $env:PATH += ";$path" }
            }
            $light = Get-Command light.exe -ErrorAction SilentlyContinue
          }
          if (-not $light) { throw "No se encontró WiX Toolset. Sin WiX, jpackage no genera .exe/.msi en Windows." }
          Write-Host "WiX disponible en: $($light.Source)"

      - name: Compilar instaladores Windows sin ProGuard
        shell: pwsh
        run: .\gradlew.bat :desktopApp:packageExe :desktopApp:packageMsi --build-cache --stacktrace

      - name: Preparar archivos de actualización
        shell: pwsh
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $binaryRoot = "desktopApp\build\compose\binaries"
          Get-ChildItem $binaryRoot -Recurse -File -Include *.msi,*.exe | Copy-Item -Destination dist

          $msi = Get-ChildItem dist -Filter *.msi | Select-Object -First 1
          $exe = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          $installer = if ($msi) { $msi } else { $exe }
          if (-not $installer) { throw "No se encontró instalador .msi ni .exe." }

          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/$($installer.Name)"
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/$env:RELEASE_TAG"
          $notes = $env:RELEASE_NOTES
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "Actualización de Calculadora de Medicamentos para Windows."
          }

          $manifest = [ordered]@{
            versionName = $env:APP_VERSION_NAME
            versionCode = $env:GITHUB_RUN_NUMBER
            platform = "windows"
            fileName = $installer.Name
            downloadUrl = $downloadUrl
            releaseUrl = $releaseUrl
            notes = $notes
          }
          $manifest | ConvertTo-Json -Depth 4 | Out-File -FilePath dist\update-windows.json -Encoding utf8
          Get-ChildItem dist

      - name: Publicar artefactos del workflow
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraMedicamentos-Windows-${{ env.APP_VERSION_NAME }}
          path: dist/*
          if-no-files-found: error

      - name: Crear o actualizar Release en GitHub
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $title = "Calculadora de Medicamentos Windows $env:APP_VERSION_NAME"
          $notes = "Actualización Windows $env:APP_VERSION_NAME. Descarga automática disponible desde la aplicación."

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG (Get-ChildItem dist -File | ForEach-Object { $_.FullName }) --clobber
          } else {
            gh release create $env:RELEASE_TAG (Get-ChildItem dist -File | ForEach-Object { $_.FullName }) --title $title --notes $notes
          }
