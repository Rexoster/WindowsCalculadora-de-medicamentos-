name: Generar actualización firmada

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Limpiar archivos generados anteriores
        run: |
          rm -rf app/build app/schemas

      - name: Revisión previa del código
        run: python3 scripts/preflight_source_checks.py

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Configurar caché de Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK mínimo
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;35.0.0" >/dev/null

      - name: Preparar versión automática
        run: |
          SOURCE_VERSION="$(grep '^VERSION_NAME=' version.properties | cut -d= -f2 | sed 's/-native$//')"
          echo "APP_VERSION_CODE=$((10000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=${SOURCE_VERSION}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Preparar y validar firma
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          test -n "$KEYSTORE_BASE64" || (echo "Falta ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Falta ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Falta ANDROID_KEY_ALIAS" && exit 1)

          KEYSTORE_FILE="$GITHUB_WORKSPACE/release.keystore"
          printf '%s' "$KEYSTORE_BASE64"             | tr -d '\r\n '             | base64 --decode > "$KEYSTORE_FILE"

          test -s "$KEYSTORE_FILE" || (echo "El archivo de firma quedó vacío" && exit 1)
          chmod 600 "$KEYSTORE_FILE"

          keytool -list             -keystore "$KEYSTORE_FILE"             -storepass "$KEYSTORE_PASSWORD"             -alias "$KEY_ALIAS" >/dev/null

          cat > "$RUNNER_TEMP/ValidatePrivateKey.java" <<'JAVA'
          import java.io.FileInputStream;
          import java.security.Key;
          import java.security.KeyStore;

          public class ValidatePrivateKey {
              public static void main(String[] args) throws Exception {
                  KeyStore keyStore = KeyStore.getInstance(
                      KeyStore.getDefaultType()
                  );

                  try (FileInputStream input = new FileInputStream(args[0])) {
                      keyStore.load(input, args[1].toCharArray());
                  }

                  Key key = keyStore.getKey(
                      args[2],
                      args[1].toCharArray()
                  );

                  if (key == null) {
                      throw new IllegalStateException(
                          "No se encontró la clave privada."
                      );
                  }

                  System.out.println(
                      "Firma validada: almacén y clave privada accesibles."
                  );
              }
          }
          JAVA

          java "$RUNNER_TEMP/ValidatePrivateKey.java"             "$KEYSTORE_FILE"             "$KEYSTORE_PASSWORD"             "$KEY_ALIAS"

      - name: Dar permiso a Gradle
        run: chmod +x gradlew

      - name: Probar y generar APK/AAB firmados
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          APP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: ./gradlew testDebugUnitTest assembleRelease bundleRelease --build-cache --no-parallel --stacktrace --warning-mode all

      - name: Renombrar archivos y manifiesto de actualización
        run: |
          APK_NAME="HerramientasClinicas-${APP_VERSION_NAME}.apk"
          AAB_NAME="HerramientasClinicas-${APP_VERSION_NAME}.aab"
          RELEASE_TAG="v${APP_VERSION_NAME}"
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${APK_NAME}"

          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          cp app/build/outputs/bundle/release/app-release.aab "$AAB_NAME"

          cat > update.json <<JSON
          {
            "versionCode": ${APP_VERSION_CODE},
            "versionName": "${APP_VERSION_NAME}",
            "apkUrl": "${APK_URL}",
            "apkFileName": "${APK_NAME}",
            "releaseUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}",
            "notes": "Actualización firmada. Puede instalarse desde la aplicación sin descargar manualmente desde GitHub."
          }
          JSON

      - name: Publicar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: HerramientasClinicas-${{ env.APP_VERSION_NAME }}
          path: |
            HerramientasClinicas-${{ env.APP_VERSION_NAME }}.apk
            HerramientasClinicas-${{ env.APP_VERSION_NAME }}.aab
            update.json
          if-no-files-found: error

      - name: Crear versión descargable en GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${APP_VERSION_NAME}" \
            "HerramientasClinicas-${APP_VERSION_NAME}.apk" \
            "HerramientasClinicas-${APP_VERSION_NAME}.aab" \
            "update.json" \
            --title "Herramientas Clínicas ${APP_VERSION_NAME}" \
            --notes "Actualización firmada. Puede instalarse desde la app o sobre una versión anterior firmada con la misma clave."
